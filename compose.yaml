services:
  db:
    image: postgres:17.7-alpine
    environment:
      POSTGRES_DB: vietnam_calendar
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vietnam_calendar"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: &backend-env
      DATABASE_URL: postgresql+psycopg://app:${POSTGRES_PASSWORD}@db:5432/vietnam_calendar
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?set ADMIN_PASSWORD_HASH}
      COOKIE_SECURE: "false"
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-disabled}
      AI_AUTO_FALLBACK: ${AI_AUTO_FALLBACK:-false}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-45}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && python -m vietnam_calendar.bootstrap"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 10s
      timeout: 3s
      retries: 10

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "vietnam_calendar.scheduler"]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "vietnam_calendar.worker"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.13.5
    profiles: ["ollama"]
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres-data:
  ollama-data:
